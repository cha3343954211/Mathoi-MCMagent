services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mathoi
      POSTGRES_PASSWORD: mathoi
      POSTGRES_DB: mathoi
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathoi"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mathoi:mathoi@postgres:5432/mathoi
      REDIS_URL: redis://redis:6379/0
    env_file:
      - ./backend/.env
    volumes:
      - workspace-data:/app/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
  workspace-data:
