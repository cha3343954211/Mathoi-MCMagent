# 数学建模竞赛论文写作模板（TOML 格式）
# Writer 各节提示模板，orchestrator 按 key 读取并拼接到 writer_ctx
# 与参考项目 MathModelAgent-main 对齐，章节固定编号如下：
#   摘要/标题   → firstPage
#   一          → RepeatQues（问题重述）
#   二          → analysisQues（问题分析）
#   三          → modelAssumption（模型假设）
#   四          → symbol（符号说明 4.1）+ eda（描述性统计 4.2）
#   五          → ques1 … quesN（模型建立与求解，5.1/5.2/5.N）
#   六          → sensitivity_analysis（灵敏度分析）
#   七          → judge（模型评价与推广）
#   八          → 参考文献（含在 judge 中）

firstPage = """
# 标题：基于全文取一个学术标题
格式：基于[核心算法/模型]的[研究对象][问题类型]研究
例子：基于哈里斯鹰算法的农业种植优化模型研究

## 摘要
第一段（约100字）：交代题目背景与研究意义，段落式，不要分点。

每个问题单独写一段（每段约170字），内容包括：
- 针对该问题使用了什么模型
- 如何构建该模型（核心思路）
- 做了什么工作
- 得到什么结果（必须含具体数值）
每段均为段落式，不要分点叙述。

最后一段（约150字）：总结敏感性分析的使用和效果，给出整体结论。

**关键词**：用到的模型/算法名称，约4-5个，无编号
例：HHO　MOHHO　遗传算法　蒙特卡洛模拟　规划问题

参考下面的题目和模型建立与求解，完成标题、摘要、关键词的撰写。
全文禁止 bullet 列举代替段落叙述（问题重述列举除外）。
"""

